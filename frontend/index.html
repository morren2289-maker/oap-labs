<!DOCTYPE html>
<html lang = "uk">

    <head>
        <meta charset="utf-8"/>
        <link rel="stylesheet" href="css/main.css">
        <script type="module" src="./dist/app.js"></script>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"  />
    <title>ЛР1-Мій застосунок</title>
    </head>
    <body>
      <div class="container">

  <header>
    <h1>Каталог навчальних ресурсів</h1>
    <p>Варіант 5</p>
  </header>

  <main class="layout">

    <section>
      <h2>Додати ресурс</h2>

      <form id="resourceForm">

        <div class="field">
          <label for="titleInput">Назва ресурсу</label>
          <input id="titleInput" type="text" required minlength="3" maxlength="100">
          <p class="error-text" id="titleError"></p>
        </div>

        <div class="field">
          <label for="authorInput">Автор</label>
          <input id="authorInput" type="text"  required minlength="3" maxlength="50">
          <p class="error-text" id="authorError"></p>
        </div>

        <div class="field">
          <label for="typeSelect">Тип ресурсу</label>

          <select id="typeSelect" required>
            <option value="">Оберіть тип</option>
            <option value="Книга">Книга</option>
            <option value="Відео">Відео</option>
            <option value="Курс">Курс</option>
          </select>

          <p class="error-text" id="typeError"></p>
        </div>

        <div class="field">
          <label for="ratingInput">Рейтинг</label>
          <input id="ratingInput" type="number" required min="1" max="5">
          <p class="error-text" id="ratingError"></p>
        </div>

        <div class="field">
          <label for="commentInput">Коментар</label>
          <textarea id="commentInput" rows="4"></textarea>
          <p class="error-text" id="commentError"></p>
        </div>

        <div class="buttons">
          <button type="submit">Додати</button>
          <button type="button" id="resetBtn">Очистити</button>
          <button type="button" id="cancelBtn">Скасувати</button>
        </div>

      </form>
    </section>

    <section>
      <h2>Список ресурсів</h2>

      <input type="text" id="searchInput" placeholder="Пошук...">

      <div class="sort-buttons">

          <button id="sortBtn">За рейтингом</button>

          <button id="sortAlphabetBtn">За алфавітом</button>

        </div>

      <table>
        <thead>
          <tr>
            <th>#</th>
            <th id="titleHeader">Назва</th>
            <th id="authorHeader">Автор</th>
            <th id="typeHeader">Тип</th>
            <th id="ratingHeader">Рейтинг</th>
            <th id="comm">Коментар</th>
            <th>Дії</th>

          </tr>
        </thead>

        <tbody id="tableBody">

        </tbody>
      </table>

    </section>

  </main>

</div>

    </body> 
</html>
